    <div class="card">
      <form id="timeForm" novalidate>
        <div class="input-group">
          <label for="sourceCity">Source City</label>
          <input type="text" id="sourceCity" placeholder="e.g., Tokyo, New York, London" autocomplete="off" aria-autocomplete="list" aria-controls="sourceList">
          <ul class="autocomplete-list" id="sourceList" role="listbox"></ul>
        </div>

        <div class="input-group">
          <label>Date & Time (24h format)</label>
          <div class="input-row">
            <input type="date" id="sourceDate" required aria-label="Source date">
            <input type="time" id="sourceTime" step="60" required aria-label="Source time">
            <button type="button" class="btn-now" id="btnNow" aria-label="Use current date and time">🕐 Now</button>
          </div>
          <div class="hint">Format: HH:MM (24-hour)</div>

        <button type="button" id="swapBtn" aria-label="Swap source and target cities">⇄ Swap Cities</button>

        <div class="input-group">
          <label for="targetCity">Target City</label>
          <input type="text" id="targetCity" placeholder="e.g., Paris, Sydney, Dubai" autocomplete="off" aria-autocomplete="list" aria-controls="targetList">
          <ul class="autocomplete-list" id="targetList" role="listbox"></ul>
        </div>

        <button type="submit" id="convertBtn">Convert Time</button>
        <div id="msgBox" class="error-msg" aria-live="polite"></div>
      </form>

      <div id="result" class="result-container hidden" aria-live="polite">
        <div class="clock-grid">
          <div class="clock-item" aria-label="Source city time">
            <div class="clock-label">Source</div>
            <div class="clock-city" id="resSourceCity"></div>
            <div class="clock-time" id="resSourceTime"></div>
            <div class="clock-offset" id="resSourceOffset"></div>
          </div>
          <div class="clock-item" aria-label="Target city time">
            <div class="clock-label">Target</div>
            <div class="clock-city" id="resTargetCity"></div>
            <div class="clock-time" id="resTargetTime"></div>
            <div class="clock-offset" id="resTargetOffset"></div>
          </div>
        </div>
        <div class="day-badge" id="resDayBadge"></div>
        <button class="copy-btn" id="copyBtn" aria-label="Copy conversion result to clipboard">📋 Copy Result</button>
      </div>
    </div>

      "daegu": "Asia/Seoul", "pyongyang": "Asia/Pyongyang", "canberra": "Australia/Sydney",
      "hobart": "Australia/Hobart", "christchurch": "Pacific/Auckland", "queensland": "Australia/Brisbane",
      "victoria": "Australia/Melbourne", "fiji": "Pacific/Fiji", "suva": "Pacific/Fiji", "papeete": "Pacific/Tahiti",
      "hilo": "Pacific/Honolulu", "kailua": "Pacific/Honolulu", "maui": "Pacific/Honolulu", "kauai": "Pacific/Honolulu"
    };

    function formatCityName(name) {
      const specialCases = {
        "new delhi": "New Delhi", "new york": "New York", "los angeles": "Los Angeles",
        "san francisco": "San Francisco", "kuala lumpur": "Kuala Lumpur", "rio de janeiro": "Rio de Janeiro",
        "sao paulo": "São Paulo", "ho chi minh": "Ho Chi Minh", "tel aviv": "Tel Aviv",
        "abu dhabi": "Abu Dhabi", "mexico city": "Mexico City", "buenos aires": "Buenos Aires", "cape town": "Cape Town"
      };
      const key = name.toLowerCase();
      if (specialCases[key]) return specialCases[key];
      return name.replace(/\b\w/g, l => l.toUpperCase());
    }

    function resolveCity(input) {
      const key = input.toLowerCase().trim();
      return CITY_TZ[key] || CITY_TZ[CITY_ALIASES[key]] || null;
    }

    function getDisplayName(input) {
      const key = input.toLowerCase().trim();
      const resolvedKey = CITY_ALIASES[key] || key;
      return formatCityName(resolvedKey);
    }

    const cities = Object.keys(CITY_TZ).sort();
    const now = new Date();
    document.getElementById('sourceDate').value = now.toISOString().split('T')[0];
    document.getElementById('sourceTime').value = now.toTimeString().slice(0,5);

    const form = document.getElementById('timeForm');
    const sourceInput = document.getElementById('sourceCity');
    const targetInput = document.getElementById('targetCity');
    const dateInput = document.getElementById('sourceDate');
    const timeInput = document.getElementById('sourceTime');
    const swapBtn = document.getElementById('swapBtn');
    const btnNow = document.getElementById('btnNow');
    const convertBtn = document.getElementById('convertBtn');
    const msgBox = document.getElementById('msgBox');
    const resultContainer = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const sourceList = document.getElementById('sourceList');
    const targetList = document.getElementById('targetList');

    function debounce(fn, delay) {
      let timer;
      return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
    }

    function showMessage(text, type = 'error') {
      msgBox.textContent = text;
      msgBox.className = `${type}-msg`;
      setTimeout(() => { if (msgBox.textContent === text) msgBox.textContent = ''; }, 4000);
    }

    function setupAutocomplete(input, list) {
      const handleInput = debounce((e) => {
        const val = e.target.value.toLowerCase();
        list.innerHTML = '';
        if (!val) return list.classList.remove('active');
        
        const matches = cities.filter(c => c.startsWith(val)).slice(0, 10);
        if (matches.length === 0) return list.classList.remove('active');

        const frag = document.createDocumentFragment();
        matches.forEach(city => {
          const li = document.createElement('li');
          li.textContent = formatCityName(city);
          li.setAttribute('role', 'option');
          li.addEventListener('click', () => {
            input.value = formatCityName(city);
            list.classList.remove('active');
            input.dispatchEvent(new Event('input'));
          });
          frag.appendChild(li);
        });
        list.appendChild(frag);
        list.classList.add('active');
      }, 150);

      input.addEventListener('input', handleInput);
      input.addEventListener('blur', () => setTimeout(() => list.classList.remove('active'), 200));
      input.addEventListener('focus', (e) => { if (e.target.value) handleInput(e); });
    }

    setupAutocomplete(sourceInput, sourceList);
    setupAutocomplete(targetInput, targetList);

    swapBtn.addEventListener('click', () => {
      const tempCity = sourceInput.value;
      sourceInput.value = targetInput.value;
      targetInput.value = tempCity;
      sourceInput.focus();
    });

    btnNow.addEventListener('click', () => {
      const d = new Date();
      dateInput.value = d.toISOString().split('T')[0];
      timeInput.value = d.toTimeString().slice(0,5);
      showMessage('Auto-filled with current local time', 'success');
    });

    function getTZOffsetMinutes(date, tz) {
      const utcStr = date.toLocaleString('en-US', { timeZone: 'UTC' });
      const tzStr = date.toLocaleString('en-US', { timeZone: tz });
      const diffMs = new Date(tzStr).getTime() - new Date(utcStr).getTime();
      return Math.round(diffMs / 60000);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      msgBox.textContent = '';
      resultContainer.classList.add('hidden');

      const sourceCity = sourceInput.value.trim();
      const targetCity = targetInput.value.trim();
      const dtStr = `${dateInput.value}T${timeInput.value}`;

      if (!sourceCity || !targetCity || !dateInput.value || !timeInput.value) {
        showMessage('Please fill in all fields.');
        return;
      }

      const sourceTZ = resolveCity(sourceCity);
      const targetTZ = resolveCity(targetCity);

      if (!sourceTZ || !targetTZ) {
        showMessage(`City not recognized: ${!sourceTZ ? sourceCity : targetCity}`);
        return;
      }

      convertBtn.disabled = true;
      convertBtn.classList.add('loading');

      setTimeout(() => {
        try {
          const [datePart, timePart] = dtStr.split('T');
          const [y, m, d] = datePart.split('-').map(Number);
          const [h, min] = timePart.split(':').map(Number);

          const utcBase = new Date(Date.UTC(y, m - 1, d, h, min));
          const sourceOffsetMs = getTZOffsetMinutes(utcBase, sourceTZ) * 60000;
          const instant = new Date(utcBase.getTime() - sourceOffsetMs);

          const formatOpts = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false };
          const sourceTime = new Intl.DateTimeFormat('en-GB', { ...formatOpts, timeZone: sourceTZ }).format(instant);
          const targetTime = new Intl.DateTimeFormat('en-GB', { ...formatOpts, timeZone: targetTZ }).format(instant);

          const getDateISO = (tz) => new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: tz }).format(instant);
          const sDate = getDateISO(sourceTZ);
          const tDate = getDateISO(targetTZ);

          let dayStatus = 'same';
          if (tDate > sDate) dayStatus = 'next';
          else if (tDate < sDate) dayStatus = 'previous';

          const formatOffset = (tz) => {
            const mins = getTZOffsetMinutes(instant, tz);
            return `UTC${mins >= 0 ? '+' : ''}${mins}`;
          };

          document.getElementById('resSourceCity').textContent = getDisplayName(sourceCity);
          document.getElementById('resTargetCity').textContent = getDisplayName(targetCity);
          document.getElementById('resSourceTime').textContent = sourceTime;
          document.getElementById('resTargetTime').textContent = targetTime;
          document.getElementById('resSourceOffset').textContent = formatOffset(sourceTZ);
          document.getElementById('resTargetOffset').textContent = formatOffset(targetTZ);

          const dayBadge = document.getElementById('resDayBadge');
          dayBadge.className = 'day-badge';
          dayBadge.textContent = `Target is on the ${dayStatus} day`;
          dayBadge.classList.add(`day-${dayStatus}`);

          resultContainer.classList.remove('hidden');
          resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } catch (err) {
          console.error(err);
          showMessage('Invalid date format or timezone error. Please try again.');
        } finally {
          convertBtn.disabled = false;
          convertBtn.classList.remove('loading');
        }
      }, 400);
    });

    copyBtn.addEventListener('click', async () => {
      const sCity = document.getElementById('resSourceCity').textContent;
      const sTime = document.getElementById('resSourceTime').textContent;
      const tCity = document.getElementById('resTargetCity').textContent;
      const tTime = document.getElementById('resTargetTime').textContent;
      const sOff = document.getElementById('resSourceOffset').textContent;
      const tOff = document.getElementById('resTargetOffset').textContent;
      const text = `${sCity} (${sOff}): ${sTime} → ${tCity} (${tOff}): ${tTime}`;
      
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select(); document.execCommand('copy');
          document.body.removeChild(ta);
        }
        copyBtn.textContent = '✅ Copied!';
        setTimeout(() => copyBtn.textContent = '📋 Copy Result', 2000);
      } catch {
        copyBtn.textContent = '❌ Copy failed';
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.input-group')) {
        sourceList.classList.remove('active');
        targetList.classList.remove('active');
      }
    });
  </script>
</body>
</html>
